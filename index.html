<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sharkie</title>
    <script src="js/models/moveable-object.class.js"></script>
    <script src="js/models/character.class.js"></script>
    <script src="js/models/puffer-fish.class.js"></script>
    <script src="js/models/jellyfish.class.js"></script>
    <script src="js/models/poison-bottle.class.js"></script>
    <script src="js/models/animated-poison-bottle.class.js"></script>
    <script src="js/models/coin.class.js"></script>
    <script src="js/models/final-boss.class.js"></script>
    <script src="js/models/bubble-animation.class.js"></script>
    <script src="js/models/fin-slap.class.js"></script>
    <script src="js/models/throwable-object.class.js"></script>
    <script src="js/models/statusbar.class.js"></script>
    <script src="js/models/poison-bar.class.js"></script>
    <script src="js/models/coin-bar.class.js"></script>
    <script src="js/models/boss-bar.class.js"></script>
    <script src="js/models/audio-manager.class.js"></script>
    <script src="js/models/fullscreen-button.class.js"></script>
    <script src="js/models/restart-button.class.js"></script>
    <script src="js/models/win-screen.class.js"></script>
    <script src="js/models/game-over-screen.class.js"></script>
    <script src="js/models/start-screen.class.js"></script>
    <script src="js/models/options-screen.class.js"></script>
    <script src="js/models/world.class.js"></script>
    <script src="js/models/background-object.class.js"></script>
    <script src="js/game.js"></script>
</head>
<body onload="showStartScreen()">
    <div class="light-rays"></div>
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="bubble bubble4"></div>
    <div class="bubble bubble5"></div>
    <div class="bubble bubble6"></div>
    
    <h1>Sharkie</h1>

    <canvas id="canvas" width="800" height="540" class="hidden"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="screen-overlay">
        <div class="screen-content">
            <button class="game-button primary-button" data-action="start-game">START</button>
            <button class="game-button secondary-button" data-action="open-options">OPTIONS</button>
        </div>
    </div>

    <!-- Options Screen -->
    <div id="options-screen" class="screen-overlay is-hidden">
        <div class="screen-content">
            <!-- Main Menu -->
            <div id="options-menu" class="options-container">
                <button class="game-button option-button" data-action="open-submenu" data-target="language">
                    <span class="button-icon">🌍</span> SPRACHEN
                </button>
                <button class="game-button option-button" data-action="open-submenu" data-target="help">
                    <span class="button-icon">❓</span> HILFE
                </button>
                <button class="game-button option-button" data-action="open-submenu" data-target="audio">
                    <span class="button-icon">🔊</span> AUDIO
                </button>
                <button class="game-button option-button" data-action="open-submenu" data-target="impressum">
                    <span class="button-icon">ℹ️</span> IMPRESSUM
                </button>
            </div>
            <button class="game-button back-button below-panel" data-action="back-start">ZURÜCK ZUM START</button>

            <!-- Language Submenu -->
            <div id="options-language" class="options-submenu is-hidden">
                <h3 class="submenu-title">SPRACHEN</h3>
                <div class="language-options">
                    <button class="game-button lang-button active" data-action="set-language" data-lang="de">🇩🇪 Deutsch</button>
                </div>
                <button class="game-button back-button" data-action="back-options">ZURÜCK</button>
            </div>

            <!-- Help Submenu -->
            <div id="options-help" class="options-submenu is-hidden">
                <h3 class="submenu-title">HILFE</h3>
                <div class="help-content"></div>
                <button class="game-button back-button" data-action="back-options">ZURÜCK</button>
            </div>

            <!-- Audio Submenu -->
            <div id="options-audio" class="options-submenu is-hidden">
                <h3 class="submenu-title">AUDIO</h3>
                <div class="audio-controls">
                    <div class="slider-container">
                        <label for="music-slider">🎵 Hintergrundmusik</label>
                        <input type="range" id="music-slider" min="0" max="100" value="30">
                        <span id="music-value" class="volume-value">30%</span>
                    </div>
                    <div class="slider-container">
                        <label for="sfx-slider">🔔 Sound-Effekte</label>
                        <input type="range" id="sfx-slider" min="0" max="100" value="50">
                        <span id="sfx-value" class="volume-value">50%</span>
                    </div>
                </div>
                <button class="game-button back-button" data-action="back-options">ZURÜCK</button>
            </div>

            <!-- Impressum Submenu -->
            <div id="options-impressum" class="options-submenu is-hidden">
                <h3 class="submenu-title">IMPRESSUM</h3>
                <div class="impressum-content"></div>
                <button class="game-button back-button" data-action="back-options">ZURÜCK</button>
            </div>
        </div>
    </div>

</body>
</html>
